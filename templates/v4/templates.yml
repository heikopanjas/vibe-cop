version: 4

# Template Configuration - Version 4 (agents.md standard)
#
# Philosophy: One AGENTS.md file that works across all agents
# - Follows https://agents.md community standard
# - Agent-specific instruction files (e.g. CLAUDE.md) reference AGENTS.md
# - Single source of truth: AGENTS.md
# - Agent-specific prompts/commands are still supported (operational files)
# - Compatible with Claude, Cursor, Copilot, Aider, Jules, Factory, and more
#
# V3 additions:
# - `shared` section for reusable file groups
# - `includes` field on languages to compose shared groups or other languages
#
# V4 additions:
# - `skills` on agents: skills associated with a specific agent (installed to agent skill dir)
# - `skills` on languages: skills associated with a language (installed to cross-client .agents/skills/)
# - `skills` on shared groups: propagated to including languages via `includes`
#
# Placeholders:
#   $workspace     - Project root directory
#   $userprofile   - User profile/home directory
#   $instructions  - Fragment merged into main AGENTS.md at insertion points
#
# Insertion Points (markdown comments preserved in final AGENTS.md):
#   <!-- {mission} -->       - Where mission/purpose fragments are inserted
#   <!-- {principles} -->    - Where principle fragments are inserted
#   <!-- {languages} -->     - Where language fragments are inserted
#   <!-- {integration} -->   - Where integration/tool fragments are inserted

# Main instruction file - single source of truth for all agents
main:
  source: AGENTS.md
  target: '$workspace/AGENTS.md'

# Agent-specific instruction files and prompts/commands
agents:
  claude:
    instructions:
      - source: claude/CLAUDE.md
        target: '$workspace/CLAUDE.md'
    prompts:
      - source: claude/commands/init-session.md
        target: '$workspace/.claude/commands/init-session.md'

  copilot:
    instructions:
      - source: copilot/copilot-instructions.md
        target: '$workspace/.github/copilot-instructions.md'
    prompts:
      - source: copilot/prompts/init-session.prompt.md
        target: '$workspace/.github/prompts/init-session.prompt.md'

  codex:
    instructions:
      - source: codex/CODEX.md
        target: '$workspace/CODEX.md'
    prompts:
      - source: codex/prompts/init-session.md
        target: '$userprofile/.codex/prompts/init-session.md'

  cursor:
    instructions:
      - source: cursor/cursorrules
        target: '$workspace/.cursorrules'
    prompts:
      - source: cursor/commands/init-session.md
        target: '$workspace/.cursor/commands/init-session.md'

# Reusable file groups shared across multiple languages
# Each group has `files` (FileMapping list) and optional `skills` (SkillDefinition list).
# Skills from shared groups propagate to including languages via `includes`.
shared:
  cmake:
    files:
      - source: cmake-build-commands.md
        target: '$instructions'
      - source: cmake-git-ignore.txt
        target: '$workspace/.gitignore'

# Language-specific coding standards templates
languages:
  c:
    includes: [cmake]
    files:
      - source: c-coding-conventions.md
        target: '$instructions'
      - source: c-format-instructions.yml
        target: '$workspace/.clang-format'
      - source: c-editor-config.ini
        target: '$workspace/.editorconfig'
  c++:
    includes: [cmake]
    files:
      - source: c++-coding-conventions.md
        target: '$instructions'
      - source: c++-format-instructions.yml
        target: '$workspace/.clang-format'
      - source: c++-editor-config.ini
        target: '$workspace/.editorconfig'
  rust:
    files:
      - source: rust-coding-conventions.md
        target: '$instructions'
      - source: rust-build-commands.md
        target: '$instructions'
      - source: rust-format-instructions.toml
        target: '$workspace/.rustfmt.toml'
      - source: rust-editor-config.ini
        target: '$workspace/.editorconfig'
      - source: rust-git-ignore.txt
        target: '$workspace/.gitignore'
  swift:
    files:
      - source: swift-coding-conventions.md
        target: '$instructions'
      - source: swift-build-commands.md
        target: '$instructions'
      - source: swift-format-instructions.json
        target: '$workspace/.swift-format'
      - source: swift-editor-config.ini
        target: '$workspace/.editorconfig'
      - source: swift-git-ignore.txt
        target: '$workspace/.gitignore'
    skills:
      - name: swift-skill
        source: 'https://github.com/twostraws/Swift-Concurrency-Agent-Skill'

# Integration templates for specific tools/workflows
integration:
  git:
    files:
      - source: git-workflow-conventions.md
        target: '$instructions'
      - source: git-attributes-common.txt
        target: '$workspace/.gitattributes'
  versioning:
    files:
      - source: semantic-versioning.md
        target: '$instructions'

# General templates that apply to all projects
principles:
  - source: core-principles.md
    target: '$instructions'
  - source: best-practices.md
    target: '$instructions'

mission:
  - source: mission-statement.md
    target: '$instructions'
  - source: technology-stack.md
    target: '$instructions'

# Agent-agnostic skills (installed based on --agent or to cross-client .agents/skills/)
#
# Skills are directories containing SKILL.md + optional supporting files.
# Source can be a local path or a full GitHub URL (no user/repo shorthand).
#
# Agent/language-specific skills use the same format under agents.<name>.skills
# or languages.<name>.skills respectively (see V4 additions above).
#
# Example:
#   skills:
#     - name: create-rule
#       source: 'https://github.com/user/cursor-skills/tree/main/create-rule'
#     - name: my-local-skill
#       source: 'skills/my-local-skill'
