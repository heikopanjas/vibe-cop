name: Build and Test

on:
  push:
    branches:
      - develop
      - feature/**
  pull_request:
    branches:
      - develop
      - feature/**

env:
  CARGO_TERM_COLOR: always

jobs:
  templates:
    name: Create Templates Archive
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create templates archive
        run: zip -r regulator-templates.zip templates/

      - name: Upload templates as artifact
        uses: actions/upload-artifact@v4
        with:
          name: regulator-templates-temp
          path: regulator-templates.zip
          if-no-files-found: error

  build:
    name: Build and Test
    needs: templates
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [nightly]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-${{ matrix.rust }}

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Check compilation
        run: cargo check --verbose

      - name: Build project
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose

      - name: Download templates archive
        uses: actions/download-artifact@v4
        with:
          name: regulator-templates-temp
          path: .

      - name: Bundle binary with templates (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path target/debug/regulator.exe, regulator-templates.zip -DestinationPath regulator-${{ matrix.os }}.zip

      - name: Bundle binary with templates (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          zip -j regulator-${{ matrix.os }}.zip target/debug/regulator regulator-templates.zip

      - name: Upload bundled artifact
        uses: actions/upload-artifact@v4
        with:
          name: regulator-${{ matrix.os }}
          path: regulator-${{ matrix.os }}.zip
          if-no-files-found: error

  release:
    name: Create Pre-Release
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/heads/feature/'))
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Rename bundled artifacts for release
        run: |
          mv artifacts/regulator-ubuntu-latest/regulator-ubuntu-latest.zip artifacts/regulator-ubuntu-latest/regulator-linux.zip
          mv artifacts/regulator-macos-latest/regulator-macos-latest.zip artifacts/regulator-macos-latest/regulator-macos.zip
          mv artifacts/regulator-windows-latest/regulator-windows-latest.zip artifacts/regulator-windows-latest/regulator-windows.zip

      - name: Generate build info
        id: build_info
        run: |
          echo "date=$(date +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_OUTPUT
          echo "date_compact=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_OUTPUT
          echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          version=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: R${{ steps.build_info.outputs.version }}_BUILD_${{ github.run_number }}_${{ steps.build_info.outputs.date_compact }}
          name: regulator-build-${{ github.run_number }}-${{ steps.build_info.outputs.date_compact }}
          prerelease: true
          draft: false
          make_latest: true
          body: |
            Automated pre-release from the `develop` branch.

            **Build Number:** ${{ github.run_number }}
            **Build Date:** ${{ steps.build_info.outputs.date }}
            **Commit:** ${{ github.sha }}

            This is an automated development build. Use at your own risk.
          files: |
            artifacts/regulator-ubuntu-latest/regulator-linux.zip
            artifacts/regulator-macos-latest/regulator-macos.zip
            artifacts/regulator-windows-latest/regulator-windows.zip
            artifacts/regulator-templates-temp/regulator-templates.zip
