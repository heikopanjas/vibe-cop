name: Build and Test

on:
  push:
    branches:
      - develop
      - feature/**
  pull_request:
    branches:
      - develop
      - feature/**

env:
  CARGO_TERM_COLOR: always

jobs:
  templates:
    name: Create Templates Archive
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Create templates archive
        run: zip -r slopctl-templates.zip templates/

      - name: Upload templates as artifact
        uses: actions/upload-artifact@v6
        with:
          name: slopctl-templates-temp
          path: slopctl-templates.zip
          if-no-files-found: error

  build:
    name: Build and Test
    needs: templates
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [nightly]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-${{ matrix.rust }}

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Check compilation
        run: cargo check --verbose

      - name: Build project
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose

      - name: Check code signing availability
        id: signing
        if: runner.os == 'macOS'
        env:
          CERT: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
        run: |
          if [ -n "$CERT" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "Signing secrets not configured, skipping code signing"
            echo "available=false" >> $GITHUB_OUTPUT
          fi

      - name: Import Apple certificate
        if: steps.signing.outputs.available == 'true'
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 20)

          echo -n "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Sign and notarize macOS binary
        if: steps.signing.outputs.available == 'true'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          codesign --force --options runtime --sign "$APPLE_SIGNING_IDENTITY" --timestamp target/debug/slopctl
          codesign --verify --verbose target/debug/slopctl

          zip -j slopctl-notarize.zip target/debug/slopctl
          xcrun notarytool submit slopctl-notarize.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --wait
          rm slopctl-notarize.zip

      - name: Clean up keychain
        if: always() && steps.signing.outputs.available == 'true'
        run: security delete-keychain $KEYCHAIN_PATH

      - name: Download templates archive
        uses: actions/download-artifact@v7
        with:
          name: slopctl-templates-temp
          path: .

      - name: Bundle binary with templates (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path target/debug/slopctl.exe, slopctl-templates.zip -DestinationPath slopctl-${{ matrix.os }}.zip

      - name: Bundle binary with templates (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          zip -j slopctl-${{ matrix.os }}.zip target/debug/slopctl slopctl-templates.zip

      - name: Upload bundled artifact
        uses: actions/upload-artifact@v6
        with:
          name: slopctl-${{ matrix.os }}
          path: slopctl-${{ matrix.os }}.zip
          if-no-files-found: error

  release:
    name: Create Pre-Release
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/heads/feature/'))
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Rename bundled artifacts for release
        run: |
          mv artifacts/slopctl-ubuntu-latest/slopctl-ubuntu-latest.zip artifacts/slopctl-ubuntu-latest/slopctl-linux.zip
          mv artifacts/slopctl-macos-latest/slopctl-macos-latest.zip artifacts/slopctl-macos-latest/slopctl-macos.zip
          mv artifacts/slopctl-windows-latest/slopctl-windows-latest.zip artifacts/slopctl-windows-latest/slopctl-windows.zip

      - name: Generate build info
        id: build_info
        run: |
          echo "date=$(date +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_OUTPUT
          echo "date_compact=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_OUTPUT
          echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          version=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: R${{ steps.build_info.outputs.version }}_BUILD_${{ github.run_number }}_${{ steps.build_info.outputs.date_compact }}
          name: slopctl-build-${{ github.run_number }}-${{ steps.build_info.outputs.date_compact }}
          prerelease: true
          draft: false
          make_latest: true
          body: |
            Automated pre-release from the `develop` branch.

            **Build Number:** ${{ github.run_number }}
            **Build Date:** ${{ steps.build_info.outputs.date }}
            **Commit:** ${{ github.sha }}

            This is an automated development build. Use at your own risk.
          files: |
            artifacts/slopctl-ubuntu-latest/slopctl-linux.zip
            artifacts/slopctl-macos-latest/slopctl-macos.zip
            artifacts/slopctl-windows-latest/slopctl-windows.zip
            artifacts/slopctl-templates-temp/slopctl-templates.zip
