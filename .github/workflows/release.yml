name: Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  templates:
    name: Create Templates Archive
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Create templates archive
        run: zip -r vibe-cop-templates.zip templates/

      - name: Upload templates as artifact
        uses: actions/upload-artifact@v6
        with:
          name: vibe-cop-templates-temp
          path: vibe-cop-templates.zip
          if-no-files-found: error

  build:
    name: Build Release
    needs: templates
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [nightly]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-${{ matrix.rust }}

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Check compilation
        run: cargo check --verbose

      - name: Build project (release)
        run: cargo build --release --verbose

      - name: Run tests
        run: cargo test --verbose

      - name: Check code signing availability
        id: signing
        if: runner.os == 'macOS'
        env:
          CERT: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
        run: |
          if [ -n "$CERT" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "Signing secrets not configured, skipping code signing"
            echo "available=false" >> $GITHUB_OUTPUT
          fi

      - name: Import Apple certificate
        if: steps.signing.outputs.available == 'true'
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 20)

          echo -n "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Sign and notarize macOS binary
        if: steps.signing.outputs.available == 'true'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          codesign --force --options runtime --sign "$APPLE_SIGNING_IDENTITY" --timestamp target/release/vibe-cop
          codesign --verify --verbose target/release/vibe-cop

          zip -j vibe-cop-notarize.zip target/release/vibe-cop
          xcrun notarytool submit vibe-cop-notarize.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --wait
          rm vibe-cop-notarize.zip

      - name: Clean up keychain
        if: always() && steps.signing.outputs.available == 'true'
        run: security delete-keychain $KEYCHAIN_PATH

      - name: Download templates archive
        uses: actions/download-artifact@v7
        with:
          name: vibe-cop-templates-temp
          path: .

      - name: Bundle binary with templates (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path target/release/vibe-cop.exe, vibe-cop-templates.zip -DestinationPath vibe-cop-${{ matrix.os }}.zip

      - name: Bundle binary with templates (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          zip -j vibe-cop-${{ matrix.os }}.zip target/release/vibe-cop vibe-cop-templates.zip

      - name: Upload bundled artifact
        uses: actions/upload-artifact@v6
        with:
          name: vibe-cop-${{ matrix.os }}
          path: vibe-cop-${{ matrix.os }}.zip
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Rename bundled artifacts for release
        run: |
          mv artifacts/vibe-cop-ubuntu-latest/vibe-cop-ubuntu-latest.zip artifacts/vibe-cop-ubuntu-latest/vibe-cop-linux.zip
          mv artifacts/vibe-cop-macos-latest/vibe-cop-macos-latest.zip artifacts/vibe-cop-macos-latest/vibe-cop-macos.zip
          mv artifacts/vibe-cop-windows-latest/vibe-cop-windows-latest.zip artifacts/vibe-cop-windows-latest/vibe-cop-windows.zip

      - name: Generate release info
        id: release_info
        run: |
          version=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.release_info.outputs.version }}
          name: vibe-cop v${{ steps.release_info.outputs.version }}
          prerelease: false
          draft: false
          make_latest: true
          body: |
            Release v${{ steps.release_info.outputs.version }}

            **Release Date:** ${{ steps.release_info.outputs.date }}
            **Commit:** ${{ github.sha }}

            This is a stable release.
          files: |
            artifacts/vibe-cop-ubuntu-latest/vibe-cop-linux.zip
            artifacts/vibe-cop-macos-latest/vibe-cop-macos.zip
            artifacts/vibe-cop-windows-latest/vibe-cop-windows.zip
            artifacts/vibe-cop-templates-temp/vibe-cop-templates.zip
